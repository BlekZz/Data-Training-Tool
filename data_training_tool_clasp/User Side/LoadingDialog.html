<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; background: #f9fafb; color: #1f2937;
      overflow: hidden;
    }

    /* === Loading state === */
    #loading-view { display: flex; flex-direction: column; align-items: center; }
    .loader {
      width: 48px; height: 48px;
      border: 5px solid #E5E7EB; border-bottom-color: #4A90D9;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text { margin-top: 20px; font-weight: 600; font-size: 16px; color: #374151; }
    .log-text { margin-top: 8px; font-size: 13px; color: #6B7280; text-align: center; padding: 0 24px; min-height: 18px; }
    .progress-container { width: 80%; background: #E5E7EB; border-radius: 10px; margin-top: 20px; height: 6px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4A90D9, #6366F1); transition: width 0.5s ease; }

    /* === Result views (error / success) === */
    #error-view, #success-view {
      display: none; flex-direction: column;
      align-items: center; padding: 8px 24px 0; text-align: center; width: 100%;
    }
    .result-icon { font-size: 36px; margin-bottom: 10px; }
    .result-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
    .result-body {
      font-size: 13px; color: #374151; border-radius: 8px;
      padding: 10px 14px; line-height: 1.6;
      margin-bottom: 16px; width: 100%; text-align: left;
    }
    #error-view .result-title { color: #DC2626; }
    #error-view .result-body {
      background: #FEF2F2; border: 1px solid #FECACA;
      max-height: 90px; overflow-y: auto;
    }
    #success-view .result-title { color: #1D4ED8; }
    #success-view .result-body { background: #EFF6FF; border: 1px solid #BFDBFE; }

    .btn {
      padding: 8px 28px; color: #fff; border: none;
      border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    #error-view .btn { background: #374151; }
    #success-view .btn { background: #1D4ED8; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-view">
    <div class="loader"></div>
    <div class="status-text">正在聯繫 AI 導師...</div>
    <div class="log-text" id="log">正在建立安全連線...</div>
    <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
  </div>

  <!-- Success -->
  <div id="success-view">
    <div class="result-icon">🆕</div>
    <div class="result-title">題目已產生！</div>
    <div class="result-body">
      🟡 <strong>淡黃色區塊</strong> = 步驟一：健檢診斷 SOP（填寫你找到的每個地雷）<br>
      🟢 <strong>淡綠色區塊</strong> = 步驟二：貼上清洗後的資料<br><br>
      完成後點選選單「3. 提交本題回答」進行 AI 評分。
    </div>
    <button class="btn" onclick="google.script.host.close()">確定，開始作答</button>
  </div>

  <!-- Error -->
  <div id="error-view">
    <div class="result-icon">❌</div>
    <div class="result-title">生成失敗</div>
    <div class="result-body" id="error-msg"></div>
    <button class="btn" onclick="google.script.host.close()">關閉</button>
  </div>

  <script>
    const logs = [
      "正在解析產業領域背景...",
      "正在構思隱蔽的資料地雷...",
      "正在生成高密度商業資料...",
      "正在注入常見業務陷阱...",
      "即將完成，正在佈置工作表..."
    ];
    let step = 0;
    const pb  = document.getElementById('pb');
    const log = document.getElementById('log');

    const ticker = setInterval(function() {
      if (step < logs.length) {
        log.innerText = logs[step];
        pb.style.width = ((step + 1) * 20) + '%';
        step++;
      }
    }, 3500);

    function showError(msg) {
      clearInterval(ticker);
      document.getElementById('loading-view').style.display = 'none';
      document.getElementById('error-msg').innerText = msg || '未知錯誤，請重試。';
      document.getElementById('error-view').style.display = 'flex';
    }

    function showSuccess() {
      clearInterval(ticker);
      document.getElementById('loading-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'flex';
    }

    window.onload = function() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || result.status === 'error') {
            showError(result ? result.message : '伺服器回傳空值，請重試。');
          } else {
            showSuccess();
          }
        })
        .withFailureHandler(function(err) {
          showError(err.message || err.toString());
        })
        .performFullGeneration();
    };
  </script>
</body>
</html>
