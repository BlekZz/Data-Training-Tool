<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Inter', -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f9fafb; color: #1f2937; overflow: hidden; }
    .loader { width: 48px; height: 48px; border: 5px solid #E5E7EB; border-bottom-color: #4A90D9; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
    @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    .status-text { margin-top: 20px; font-weight: 600; font-size: 16px; color: #374151; }
    .log-text { margin-top: 8px; font-size: 13px; color: #6B7280; text-align: center; padding: 0 20px; }
    .progress-container { width: 80%; background-color: #E5E7EB; border-radius: 10px; margin-top: 20px; height: 6px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4A90D9, #6366F1); transition: width 0.5s ease; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div class="status-text" id="status">正在聯繫 AI 導師...</div>
  <div class="log-text" id="log">正在建立安全連線...</div>
  <div class="progress-container"><div class="progress-bar" id="pb"></div></div>

  <script>
    const logs = [
      "正在解析產業領域背景...",
      "正在構思隱蔽的地雷地雷...",
      "正在生成高密度商業資料...",
      "正在注入常見業務陷阱...",
      "即將完成，正在佈置工作表..."
    ];
    let step = 0;
    const pb = document.getElementById('pb');
    const logEl = document.getElementById('log');
    
    const interval = setInterval(() => {
      if (step < logs.length) {
        logEl.innerText = logs[step];
        pb.style.width = ((step + 1) * 20) + "%";
        step++;
      }
    }, 3500);

    window.onload = function() {
      // 呼叫後端總控函式，完成一條龍作業
      google.script.run
        .withSuccessHandler(function(result) {
          clearInterval(interval);
          if (result.status === "error") {
            google.script.run.showErrorMessage(result.message);
          }
          // 不論成功或失敗都關閉彈窗 (成功的話會由 server-side 的 alert 接手 UI)
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          clearInterval(interval);
          google.script.run.showErrorMessage(error.toString());
          google.script.host.close();
        })
        .performFullGeneration();
    };
  </script>
</body>
</html>
