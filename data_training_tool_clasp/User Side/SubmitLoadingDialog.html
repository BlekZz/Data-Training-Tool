<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Inter', -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f9fafb; color: #1f2937; overflow: hidden; }
    .loader { width: 48px; height: 48px; border: 5px solid #E5E7EB; border-bottom-color: #6366F1; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
    @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    .status-text { margin-top: 20px; font-weight: 600; font-size: 16px; color: #374151; }
    .log-text { margin-top: 8px; font-size: 13px; color: #6B7280; text-align: center; padding: 0 20px; }
    .progress-container { width: 80%; background-color: #E5E7EB; border-radius: 10px; margin-top: 20px; height: 6px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #6366F1, #A855F7); transition: width 0.5s ease; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div class="status-text" id="status">AI 導師正在批改...</div>
  <div class="log-text" id="log">正在讀取你的診斷報告...</div>
  <div class="progress-container"><div class="progress-bar" id="pb"></div></div>

  <script>
    const logs = [
      "正在比對標準答案與你的健檢 SOP...",
      "正在分析商業邏輯判斷能力...",
      "正在評估異常值處置策略...",
      "正在計算清洗完整度...",
      "正在撰寫 AI 盲區雷達診斷..."
    ];
    let step = 0;
    const pb = document.getElementById('pb');
    const logEl = document.getElementById('log');
    
    // 模擬進度條
    const interval = setInterval(() => {
      if (step < logs.length) {
        logEl.innerText = logs[step];
        pb.style.width = ((step + 1) * 20) + "%";
        step++;
      }
    }, 3000);

    // 視窗載入後立即執行
    window.onload = function() {
      // payload 由 HtmlService 動態注入到全域
      if (typeof payload === 'undefined') {
        google.script.run.showErrorMessage("Payload missing");
        google.script.host.close();
        return;
      }

      google.script.run
        .withSuccessHandler(function(result) {
          clearInterval(interval);
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          clearInterval(interval);
          google.script.run.showErrorMessage(error.toString());
          google.script.host.close();
        })
        .performFullSubmit(payload);
    };
  </script>
</body>
</html>
